name: 競馬予想 note自動投稿

on:
  schedule:
    # GitHub Actions cron は遅延・スキップ多発のため複数時刻にバックアップ実行
    # 毎週金曜 20:30 / 21:00 / 21:30 / 22:00 JST → 土曜予想
    - cron: '32 11 * * 5'
    - cron: '7 12 * * 5'
    - cron: '37 12 * * 5'
    - cron: '7 13 * * 5'
    # 毎週土曜 20:30 / 21:00 / 21:30 / 22:00 JST → 日曜予想
    - cron: '32 11 * * 6'
    - cron: '7 12 * * 6'
    - cron: '37 12 * * 6'
    - cron: '7 13 * * 6'
    # 月曜 07:00 JST → 結果照合・モデル改善
    - cron: '7 22 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'saturday'
        type: choice
        options:
          - saturday
          - sunday
          - saturday_main_only
          - sunday_main_only
          - review

# セキュリティ: 最小権限（Actions API への書き込みのみ必要）
permissions:
  contents: read
  actions: write

jobs:
  predict-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 6時間→3時間に短縮（netkeiba無限ブロック対策）
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Setup Chrome (Selenium 用)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # セキュリティ: セッションファイルはキャッシュに含めない（Secret から毎回復元）
      - name: Restore non-secret cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache
            data/model_weights.json
            data/learnings.json
            data/weekly_trend.json
            data/payout_calibration.json
            data/ml_meta_model.json
            data/prob_calibration.json
            data/context_weights.json
          key: keiba-cache-${{ github.run_id }}
          restore-keys: |
            keiba-cache-

      - name: Restore session from secret
        env:
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: |
          mkdir -p data
          if [ -n "$NOTE_SESSION_B64" ]; then
            echo "$NOTE_SESSION_B64" | base64 -d > data/note_session.json
            echo "セッションファイル復元完了"
          else
            echo "::warning::NOTE_SESSION_B64 が未設定"
          fi

      - name: Session pre-flight check
        id: preflight
        continue-on-error: true
        run: python scripts/session_preflight.py

      - name: Auto-renew session if pre-flight failed
        if: steps.preflight.outcome == 'failure'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          echo "::notice::セッション失効を検知、再生成を試行"
          python scripts/renew_note_session.py || true
          # 再生成後の Secret 反映には次回run必要なので、本runは email+password で続行
          echo "RENEWAL_ATTEMPTED=1" >> "$GITHUB_ENV"

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "5" ]; then echo "mode=saturday" >> "$GITHUB_OUTPUT"
            elif [ "$DOW" = "6" ]; then echo "mode=sunday" >> "$GITHUB_OUTPUT"
            else echo "mode=review" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Dedupe check (skip if recently posted)
        id: dedupe
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          NOW=$(date -u +%s)
          RECENT=$(gh run list --workflow=auto_post.yml --repo ${{ github.repository }} \
            --status=success --limit=10 --json createdAt,conclusion,displayTitle 2>/dev/null \
            | jq -r --arg mode "$MODE" '.[] | select(.displayTitle | contains($mode)) | .createdAt' | head -1)
          if [ -n "$RECENT" ]; then
            RECENT_TS=$(date -u -d "$RECENT" +%s 2>/dev/null || echo 0)
            DIFF=$((NOW - RECENT_TS))
            if [ $DIFF -lt 21600 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "[SKIP] 直近6時間以内に $MODE モードで成功完了済み（${DIFF}秒前）"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run prediction (saturday)
        id: pred_sat
        timeout-minutes: 90
        if: steps.mode.outputs.mode == 'saturday' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python main.py --run-now saturday

      - name: Run prediction (sunday)
        id: pred_sun
        timeout-minutes: 90
        if: steps.mode.outputs.mode == 'sunday' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python main.py --run-now sunday

      - name: Run prediction (sunday main only)
        if: steps.mode.outputs.mode == 'sunday_main_only'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python main.py --run-now sunday --main-only

      - name: Run prediction (saturday main only)
        if: steps.mode.outputs.mode == 'saturday_main_only'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python main.py --run-now saturday --main-only

      - name: Weekly review & weight optimization
        if: steps.mode.outputs.mode == 'review' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python weekly_review.py

      - name: Inline retry for stuck drafts
        if: always() && steps.mode.outputs.mode != 'review'
        env:
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: |
          if [ -n "$NOTE_SESSION_B64" ]; then
            echo "$NOTE_SESSION_B64" | base64 -d > data/note_session.json
          fi
          sleep 300
          python scripts/find_and_publish_drafts.py || true

      - name: Health check (note.com で実投稿確認)
        id: health
        if: always() && steps.mode.outputs.mode != 'review'
        continue-on-error: true
        env:
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
        run: |
          # 投稿予期本数（saturday/sunday は1本以上）
          EXPECTED=1
          python scripts/post_healthcheck.py $EXPECTED

      - name: Escalate to publish_retry on health failure
        if: always() && steps.mode.outputs.mode != 'review' && steps.health.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "::warning::投稿未達と判定、publish_retry を即トリガ"
          gh workflow run "下書き自動公開リトライ" --repo ${{ github.repository }} || true

      - name: Save non-secret cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/cache
            data/model_weights.json
            data/learnings.json
            data/weekly_trend.json
            data/payout_calibration.json
            data/ml_meta_model.json
            data/prob_calibration.json
            data/context_weights.json
          key: keiba-cache-${{ github.run_id }}

      - name: Cleanup session file (security)
        if: always()
        run: rm -f data/note_session.json

      - name: Upload non-sensitive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keiba-output-${{ github.run_id }}
          path: |
            data/predictions/
            data/performance/
            data/backtest/
            data/output/
          retention-days: 30
          if-no-files-found: ignore
