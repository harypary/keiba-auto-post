name: 競馬予想 note自動投稿

on:
  schedule:
    # GitHub Actions cron は遅延・スキップ多発のため複数時刻にバックアップ実行
    # 毎週金曜 20:30 / 21:00 / 21:30 / 22:00 JST → 土曜予想
    - cron: '32 11 * * 5'
    - cron: '7 12 * * 5'
    - cron: '37 12 * * 5'
    - cron: '7 13 * * 5'
    # 毎週土曜 20:30 / 21:00 / 21:30 / 22:00 JST → 日曜予想
    - cron: '32 11 * * 6'
    - cron: '7 12 * * 6'
    - cron: '37 12 * * 6'
    - cron: '7 13 * * 6'
    # 月曜 07:00 JST → 結果照合・モデル改善
    - cron: '7 22 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'saturday'
        type: choice
        options:
          - saturday
          - sunday
          - saturday_main_only
          - sunday_main_only
          - review
      scrape_mode:
        description: 'スクレイピングモード (full=本格分析 / fast=高速で全レース確実投稿)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - fast
      chain_depth:
        description: '自動継続の深さ（内部用・手動では 0 のまま）'
        required: false
        default: '0'
        type: string

# セキュリティ: 最小権限（Actions API への書き込みのみ必要）
permissions:
  contents: read
  actions: write

# 重複投稿の根本原因対策: 同モードの並行実行を絶対禁止
concurrency:
  group: auto-post-${{ inputs.mode || 'scheduled' }}
  cancel-in-progress: false   # 走行中のrun は守る、新規は wait

jobs:
  predict-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 200   # 1パス分（予想150分+後処理）。残レースは self-chain が継続投稿
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Setup Chrome (Selenium 用)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # セキュリティ: セッションファイルはキャッシュに含めない（Secret から毎回復元）
      - name: Restore non-secret cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache
            data/model_weights.json
            data/learnings.json
            data/weekly_trend.json
            data/payout_calibration.json
            data/ml_meta_model.json
            data/prob_calibration.json
            data/context_weights.json
            data/published_articles.json
          key: keiba-cache-${{ github.run_id }}
          restore-keys: |
            keiba-horse-cache-
            keiba-cache-

      # 重複防止: 直近の published_articles_log artifact をダウンロード（過去の投稿履歴）
      - name: Download published articles log artifact (dedup)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          # 直近 auto_post run の published-articles-log artifact を取得
          mkdir -p data
          gh run list --workflow=auto_post.yml --repo ${{ github.repository }} \
            --status=success --limit=10 --json databaseId \
            --jq '.[].databaseId' 2>/dev/null | while read -r rid; do
            if gh run download "$rid" --repo ${{ github.repository }} -n published-articles-log -D data/ 2>/dev/null; then
              echo "投稿ログ取得成功: run $rid"
              break
            fi
          done
          # 取得できなかった場合は空 dict で初期化
          if [ ! -f data/published_articles.json ]; then
            echo '{"by_race_key": {}, "by_title": {}}' > data/published_articles.json
          fi
          echo "投稿ログサイズ: $(wc -c < data/published_articles.json) bytes"

      # macOS prefetch workflow が保存した artifact を最新の prefetch run から取得（あれば）
      - name: Find latest prefetch artifact
        id: prefetch_artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          # 直近24時間以内の prefetch_horse_cache.yml の成功 run を取得
          RUN_ID=$(gh run list --workflow=prefetch_horse_cache.yml --repo ${{ github.repository }} \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "最新prefetch run: $RUN_ID"
          else
            echo "run_id=" >> "$GITHUB_OUTPUT"
            echo "prefetch artifact なし"
          fi
      - name: Download pre-fetched horse cache artifact
        if: steps.prefetch_artifact.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: horse-cache-*
          path: data/cache
          merge-multiple: true
          github-token: ${{ secrets.GH_PAT || github.token }}
          run-id: ${{ steps.prefetch_artifact.outputs.run_id }}
          repository: ${{ github.repository }}

      - name: Restore session from secret
        env:
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: |
          mkdir -p data
          if [ -n "$NOTE_SESSION_B64" ]; then
            echo "$NOTE_SESSION_B64" | base64 -d > data/note_session.json
            echo "セッションファイル復元完了"
          else
            echo "::warning::NOTE_SESSION_B64 が未設定"
          fi

      - name: Session pre-flight check
        id: preflight
        continue-on-error: true
        run: python scripts/session_preflight.py

      - name: Auto-renew session if pre-flight failed
        if: steps.preflight.outcome == 'failure'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          echo "::notice::セッション失効を検知、再生成を試行"
          python scripts/renew_note_session.py || true
          # 再生成後の Secret 反映には次回run必要なので、本runは email+password で続行
          echo "RENEWAL_ATTEMPTED=1" >> "$GITHUB_ENV"

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "5" ]; then echo "mode=saturday" >> "$GITHUB_OUTPUT"
            elif [ "$DOW" = "6" ]; then echo "mode=sunday" >> "$GITHUB_OUTPUT"
            else echo "mode=review" >> "$GITHUB_OUTPUT"
            fi
          fi

      # 自宅PCがローカル取得して Release 配信した馬データキャッシュを取得。
      # netkeiba は GitHub の全IPを403ブロックするため、これが唯一の高精度データ源。
      # actions/cache や（ブロック済みの）prefetch artifact より後に展開して上書きする。
      - name: Download local-prefetched horse cache from Release
        if: steps.mode.outputs.mode == 'saturday' || steps.mode.outputs.mode == 'sunday'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          # 予測(main.py)と完全に同じロジックで対象日を算出（タグ一致を保証）
          TARGET=$(python -c "
          from datetime import date,timedelta
          m='$MODE'
          t=date.today()
          d=(5-t.weekday())%7 if m=='saturday' else (6-t.weekday())%7 if m=='sunday' else 0
          print((t+timedelta(days=d)).strftime('%Y%m%d'))
          ")
          echo "対象日: $TARGET"
          mkdir -p data/cache
          DL_OK=""
          for TAG in "horse-cache-$TARGET" \
                     "horse-cache-$(date -u -d "$TARGET +1 day" +%Y%m%d 2>/dev/null || echo x)" \
                     "horse-cache-$(date -u -d "$TARGET -1 day" +%Y%m%d 2>/dev/null || echo x)"; do
            if gh release download "$TAG" --repo ${{ github.repository }} -p 'horse_cache_*.zip' -D /tmp/hc 2>/dev/null \
               || gh release download "$TAG" --repo ${{ github.repository }} --pattern '*.zip' -D /tmp/hc 2>/dev/null; then
              echo "Release取得成功: $TAG"
              DL_OK=1
              break
            fi
          done
          if [ -z "$DL_OK" ]; then
            echo "::warning::対象日近辺の horse-cache Release が見つかりません（自宅PCの事前取得が未実行の可能性）"
          else
            for z in /tmp/hc/*.zip; do
              [ -f "$z" ] || continue
              python -c "import zipfile,sys; zipfile.ZipFile('$z').extractall('data/cache')"
            done
            echo "馬キャッシュ展開後の総ファイル数: $(ls data/cache | wc -l)"
          fi

      - name: Dedupe check (skip if recently posted)
        id: dedupe
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          NOW=$(date -u +%s)
          RECENT=$(gh run list --workflow=auto_post.yml --repo ${{ github.repository }} \
            --status=success --limit=10 --json createdAt,conclusion,displayTitle 2>/dev/null \
            | jq -r --arg mode "$MODE" '.[] | select(.displayTitle | contains($mode)) | .createdAt' | head -1)
          if [ -n "$RECENT" ]; then
            RECENT_TS=$(date -u -d "$RECENT" +%s 2>/dev/null || echo 0)
            DIFF=$((NOW - RECENT_TS))
            if [ $DIFF -lt 21600 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "[SKIP] 直近6時間以内に $MODE モードで成功完了済み（${DIFF}秒前）"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run prediction (saturday)
        id: pred_sat
        timeout-minutes: 150
        if: steps.mode.outputs.mode == 'saturday' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          SCRAPE_MODE: ${{ inputs.scrape_mode || 'full' }}
          # 投稿用 playwright と競合するため馬データ取得用 playwright は完全無効化
          DISABLE_PLAYWRIGHT_FETCH: "1"
        run: python main.py --run-now saturday

      - name: Run prediction (sunday)
        id: pred_sun
        timeout-minutes: 150
        if: steps.mode.outputs.mode == 'sunday' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          SCRAPE_MODE: ${{ inputs.scrape_mode || 'full' }}
          # 投稿用 playwright と競合するため馬データ取得用 playwright は完全無効化
          DISABLE_PLAYWRIGHT_FETCH: "1"
        run: python main.py --run-now sunday

      - name: Run prediction (sunday main only)
        if: steps.mode.outputs.mode == 'sunday_main_only'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          SCRAPE_MODE: ${{ inputs.scrape_mode || 'full' }}
          # 投稿用 playwright と競合するため馬データ取得用 playwright は完全無効化
          DISABLE_PLAYWRIGHT_FETCH: "1"
        run: python main.py --run-now sunday --main-only

      - name: Run prediction (saturday main only)
        if: steps.mode.outputs.mode == 'saturday_main_only'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          SCRAPE_MODE: ${{ inputs.scrape_mode || 'full' }}
          # 投稿用 playwright と競合するため馬データ取得用 playwright は完全無効化
          DISABLE_PLAYWRIGHT_FETCH: "1"
        run: python main.py --run-now saturday --main-only

      - name: Weekly review & weight optimization
        if: steps.mode.outputs.mode == 'review' && steps.dedupe.outputs.skip != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: python weekly_review.py

      - name: Inline retry for stuck drafts
        if: always() && steps.mode.outputs.mode != 'review'
        env:
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: |
          if [ -n "$NOTE_SESSION_B64" ]; then
            echo "$NOTE_SESSION_B64" | base64 -d > data/note_session.json
          fi
          sleep 300
          python scripts/find_and_publish_drafts.py || true

      - name: Health check (note.com で実投稿確認)
        id: health
        if: always() && steps.mode.outputs.mode != 'review'
        continue-on-error: true
        env:
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
        run: |
          # 投稿予期本数（saturday/sunday は1本以上）
          EXPECTED=1
          python scripts/post_healthcheck.py $EXPECTED

      - name: Escalate to publish_retry on health failure
        if: always() && steps.mode.outputs.mode != 'review' && steps.health.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "::warning::投稿未達と判定、publish_retry を即トリガ"
          gh workflow run "下書き自動公開リトライ" --repo ${{ github.repository }} || true

      # 予想が時間切れ/失敗で途中終了した場合、残りレースを自動で投稿する継続run を起動。
      # dedup により投稿済みは自動スキップされるため、各 run は未投稿レースだけを処理し、
      # 全レースが出揃うまで連鎖する（root cause: 90分timeoutで11R以降が未投稿だった事象の恒久対策）。
      - name: Self-chain to post remaining races if cut off
        if: always() && steps.dedupe.outputs.skip != 'true' && (steps.pred_sat.outcome == 'failure' || steps.pred_sun.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          DEPTH="${{ inputs.chain_depth || '0' }}"
          NEXT=$((DEPTH + 1))
          if [ "$NEXT" -gt 6 ]; then
            echo "::warning::self-chain 上限(6)到達。これ以上の自動継続は停止（手動確認推奨）"
            exit 0
          fi
          MODE="${{ steps.mode.outputs.mode }}"
          echo "::notice::予想が途中終了（未投稿レース残存）。fast モードで継続run を起動 (depth=$NEXT)"
          gh workflow run "競馬予想 note自動投稿" --repo ${{ github.repository }} \
            -f mode="$MODE" -f scrape_mode=fast -f chain_depth="$NEXT" || true

      - name: Save non-secret cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/cache
            data/model_weights.json
            data/learnings.json
            data/weekly_trend.json
            data/payout_calibration.json
            data/ml_meta_model.json
            data/prob_calibration.json
            data/context_weights.json
            data/published_articles.json
          key: keiba-cache-${{ github.run_id }}

      - name: Cleanup session file (security)
        if: always()
        run: rm -f data/note_session.json

      - name: Upload non-sensitive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keiba-output-${{ github.run_id }}
          path: |
            data/predictions/
            data/performance/
            data/backtest/
            data/output/
          retention-days: 30
          if-no-files-found: ignore

      # 投稿ログを別 artifact として保存（次 run の重複防止用、長期保持）
      - name: Upload published articles log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: published-articles-log
          path: data/published_articles.json
          retention-days: 90
          if-no-files-found: ignore
          overwrite: true
