name: 下書き自動公開リトライ

# 投稿成功率向上のため、メイン投稿後に下書きが残っている場合
# 30分ごとに最大8回まで自動で公開リトライする。
# 24時間以内に全件公開完了する設計。

on:
  schedule:
    # 土曜 22:00, 22:30, 23:00, 23:30, 00:00, 00:30, 01:00, 01:30 JST
    - cron: '0 13 * * 6'
    - cron: '30 13 * * 6'
    - cron: '0 14 * * 6'
    - cron: '30 14 * * 6'
    - cron: '0 15 * * 6'
    - cron: '30 15 * * 6'
    - cron: '0 16 * * 6'
    - cron: '30 16 * * 6'
    # 日曜 22:00, 22:30, 23:00, 23:30, 00:00, 00:30, 01:00, 01:30 JST
    - cron: '0 13 * * 0'
    - cron: '30 13 * * 0'
    - cron: '0 14 * * 0'
    - cron: '30 14 * * 0'
    - cron: '0 15 * * 0'
    - cron: '30 15 * * 0'
    - cron: '0 16 * * 0'
    - cron: '30 16 * * 0'
  workflow_dispatch:

jobs:
  retry-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright requests
          playwright install chromium
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Restore session cache
        uses: actions/cache@v4
        with:
          path: data/note_session.json
          key: keiba-session-${{ github.run_id }}
          restore-keys: keiba-session-
      - name: Publish remaining drafts
        env:
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
        run: |
          # B64 から セッション復元
          if [ -n "$NOTE_SESSION_B64" ]; then
            echo "$NOTE_SESSION_B64" | base64 -d > data/note_session.json
          fi
          python scripts/find_and_publish_drafts.py
